<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มรับสมัครสมาชิกห้องสมุด</title>
</head>
<body>
    <h1>แบบฟอร์มการสมัครสมาชิกห้องสมุด</h1>
    <form>
        <label for="thaiName">ชื่อ - นามสกุล (ภาษาไทย): <span style="color:red;">*</span></label>
        <input type="text"id="thai-Name" name="thai-Name" required placeholder="กรอกชื่อ-นามสกุล"><br><br>
        
        <label for="englishName">ชื่อ - นามสกุล (ภาษาอังกฤษ): <span style="color: red;">*</span></label>
        <input type="text" id="english-Name" name="english-Name" required placeholder="กรอกชื่อ-นามสกุล(ภาษาอังกฤษ)"><br><br>

        <label for="gender">เพศ:</label> <span style="color: red;">*</span></label>
        <input type="radio" id="male" name="gender" value="male" required>
        <label for="male">ชาย</label>
        <input type="radio" id="female" name="gender" value="female" required>
        <label for="female">หญิง</label>
        <input type="radio" id="other" name="gender" value="other" required>
        <label for="other">อื่นๆ</label>
        <br><br>
    </form>
</body>
</html>
