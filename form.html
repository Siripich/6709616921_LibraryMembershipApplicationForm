<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มรับสมัครสมาชิกห้องสมุด</title>
</head>
<body>
    <h1>📖แบบฟอร์มการสมัครสมาชิกห้องสมุด📖</h1>
    <form>
        <label for="thaiName">ชื่อ - นามสกุล (ภาษาไทย): <span style="color:red;">*</span></label>
        <input type="text"id="thai-Name" name="thai-Name" required placeholder="กรอกชื่อ-นามสกุล"><br><br>
        
        <label for="englishName">ชื่อ - นามสกุล (ภาษาอังกฤษ): <span style="color: red;">*</span></label>
        <input type="text" id="english-Name" name="english-Name" required placeholder="กรอกชื่อ-นามสกุล(ภาษาอังกฤษ)"><br><br>

        <label for="gender">เพศ:</label> <span style="color: red;">*</span></label>
        <input type="radio" id="male" name="gender" value="male" required>
        <label for="male">ชาย</label>
        <input type="radio" id="female" name="gender" value="female" required>
        <label for="female">หญิง</label>
        <input type="radio" id="other" name="gender" value="other" required>
        <label for="other">อื่นๆ</label>
        <br><br>

        <label for="studentID">รหัสนักศึกษา: <span style="color: red;">*</span></label>
        <input type="text" id="studentID" name="studentID" pattern="\d{10}" title="กรุณากรอกตัวเลข 10 หลัก" required placeholder="กรุณากรอกรหัสนักศึกษา 10หลัก"><br><br>

        <label for="faculty">คณะที่ศึกษา: <span style="color: red;">*</span></label>
        <input type="text" id="faculty" name="faculty" required placeholder="กรุณากรอกคณะที่กำลังศึกษา"><br><br>

        <label for="email">ที่อยู่อีเมล: <span style="color: red;">*</span></label>
        <input type="email" id="email" name="email" required placeholder="กรุณากรอกอีเมล"><br><br>
        
        <label for="birthdate">วันเดือนปีเกิด: <span style="color: red;">*</span></label>
        <input type="date" id="birthdate" name="birthdate" required><br><br>

        <label for="bookType">ประเภทของหนังสือที่สนใจ:</label><br>
        <select id="bookType" name="bookType">
            <option value="fiction">นิยาย</option>
            <option value="non-fiction">สารคดี</option>
            <option value="science">วิทยาศาสตร์</option>
            <option value="history">ประวัติศาสตร์</option>
            <option value="finance">ธุรกิจและการเงิน</option>
            <option value="other">อื่นๆ</option>
        </select><br><br>

        <label>ต้องการรับข่าวสารข้อมูลของห้องสมุดทางอีเมลหรือไม่:</label><br>
        <input type="checkbox" id="subscribe" name="subscribe">
        <label for="subscribe">รับข่าวสารเพิ่มเติมทางอีเมล</label><br><br>

        <button type="submit">สมัครสมาชิก</button>
    </form>
</body>
</html>
